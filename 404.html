<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>404 - Page Not Found | Web of VLSI</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; --bg: #06101f; --text: #edf6ff; --muted: #9fb0c9; --cyan: #5eead4; --blue: #5da8ff; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; margin: 0; }
    body { background: var(--bg); color: var(--text); min-height: 100svh; display: grid; place-items: center; text-align: center; padding: 20px; }
    .wrap { max-width: 520px; }
    h1 { font-size: clamp(5rem, 15vw, 10rem); line-height: 1; margin: 0; background: linear-gradient(135deg, var(--cyan), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { color: var(--muted); margin: 18px 0 28px; font-size: 1.1rem; line-height: 1.7; }
    a { display: inline-flex; align-items: center; gap: 8px; padding: 0 22px; height: 48px; border-radius: 12px; background: linear-gradient(135deg, var(--cyan), var(--blue)); color: #02101f; font-weight: 800; text-decoration: none; transition: transform 200ms cubic-bezier(0.16,1,0.3,1); }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist or has been moved. Use the button below to return to the home page.</p>
    <a href="/webofvlsi-pro/">Back to Home</a>
  </div>
</body>
</html>
